# Witchesbrew tmux theme
# Source this in your tmux.conf: source-file /path/to/witchesbrew.conf

# --- Colors ---
# base:        #11080d
# surface:     #262a2f
# overlay:     #3a3540
# text:        #e0ddd8
# subtle:      #d0cdc8
# faint:       #b8b5b0
# muted:       #7a7872
# pink:        #a68295
# red:         #da9188
# green:       #94a681
# yellow:      #a69481
# blue:        #8194a6
# purple:      #866399
# teal:        #88b5aa
# brightpink:  #e1b1cd
# brightblue:  #b3c7dd
# hi_low:      #2e2920
# hi_med:      #524a3c

# Status bar
set -g status-position bottom
set -g status-style "bg=#11080d,fg=#7a7872"
set -g status-left-length 30
set -g status-right-length 50

set -g status-left "#[bg=#a68295,fg=#11080d,bold] #S #[bg=#11080d,fg=#a68295] "
set -g status-right "#[fg=#524a3c]│ #[fg=#7a7872]%H:%M #[fg=#524a3c]│ #[fg=#a68295]%d %b "

# Window status
set -g window-status-format " #[fg=#7a7872]#I #W "
set -g window-status-current-format " #[fg=#e1b1cd,bold]#I #W "
set -g window-status-separator "#[fg=#524a3c]·"

# Pane borders
set -g pane-border-style "fg=#524a3c"
set -g pane-active-border-style "fg=#a68295"

# Message / command prompt
set -g message-style "bg=#262a2f,fg=#e0ddd8"
set -g message-command-style "bg=#262a2f,fg=#e0ddd8"

# Copy / visual mode
set -g mode-style "bg=#524a3c,fg=#e0ddd8"

# Clock
set -g clock-mode-colour "#a68295"

# Popup borders
set -g popup-border-style "fg=#a68295"
